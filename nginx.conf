server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the api container (same docker network).
    # Use the unique container name (not the generic "api" service alias) so
    # this is unambiguous on the shared external network, where other projects
    # may also expose an "api" alias.
    # No trailing slash on proxy_pass so the /api prefix is preserved
    # (the API routes are served under /api/...).
    location /api/ {
        proxy_pass http://out-the-door-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
