networks:
  default:
    name: out-the-door-net
  shared-net:
    external: true

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: out-the-door
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80"
    networks:
      - default
      - shared-net
